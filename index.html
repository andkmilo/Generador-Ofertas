<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Propuestas Express</title>
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Escudo_de_Independiente_Santa_Fe.png/1200px-Escudo_de_Independiente_Santa_Fe.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden max-w-md w-full border border-gray-100">
        <div class="bg-[#232f3e] p-8 text-center">
            <div class="flex justify-center mb-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/93/Amazon_Web_Services_Logo.svg" alt="AWS Logo" class="h-12 brightness-0 invert">
            </div>
            <h1 class="text-white text-2xl font-bold mb-2">Propuestas Express</h1>
            <p class="text-gray-400 text-sm leading-relaxed">
                Generación de propuestas generada con herramientas de IA, recuerda que debes subir el CSV en idioma español
            </p>
        </div>

        <div class="p-8 space-y-6">
            <div id="dropZone" class="border-2 border-dashed border-green-300 bg-green-50 rounded-2xl p-8 text-center cursor-pointer hover:bg-green-100 transition-all">
                <i class="fas fa-cloud-upload-alt text-4xl text-green-500 mb-3"></i>
                <p id="fileNameDisplay" class="text-gray-600 font-medium">Selecciona el CSV de la Calculadora</p>
                <input type="file" id="fileInput" accept=".csv" class="hidden">
            </div>

            <button id="processBtn" class="w-full bg-[#ff9900] hover:bg-[#e68a00] text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                <i class="fas fa-wand-magic-sparkles"></i> Generar Propuesta
            </button>

            <div id="resultArea" class="hidden mt-4 p-4 bg-blue-50 rounded-2xl text-center border border-blue-200">
                <p class="text-blue-700 font-bold mb-3">✨ ¡Resumen técnico generado!</p>
                <a id="downloadLink" href="#" class="inline-flex items-center gap-2 bg-green-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-green-700">
                    <i class="fas fa-file-excel"></i> Descargar Excel
                </a>
            </div>
        </div>

        <div class="p-4 bg-gray-50 text-center border-t border-gray-100">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest">
                Todos los derechos reservados - Creado por Andres Alfonso 🦁 :)
            </p>
        </div>
    </div>

    <script>
        // URL corregida de tu API Gateway
        const API_URL = "https://k11uv8z8r5.execute-api.us-east-1.amazonaws.com/Prod1/generar";
        
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const processBtn = document.getElementById('processBtn');
        const resultArea = document.getElementById('resultArea');

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const name = e.target.files[0]?.name;
            if (name) document.getElementById('fileNameDisplay').innerText = `Archivo: ${name}`;
        };

        processBtn.onclick = async () => {
            const file = fileInput.files[0];
            if (!file) return alert("Sube el archivo primero");

            processBtn.disabled = true;
            processBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';

            try {
                const resUrl = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "get_upload_url", file_name: file.name })
                });
                const presignedData = await resUrl.json();

                if (!presignedData.fields) throw new Error("Error en la respuesta de la API");

                const formData = new FormData();
                Object.entries(presignedData.fields).forEach(([k, v]) => formData.append(k, v));
                formData.append("file", file);

                await fetch(presignedData.url, { method: 'POST', body: formData });

                const resProc = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "process", file_name: file.name })
                });
                const dataProc = await resProc.json();

                if (dataProc.download_url) {
                    document.getElementById('downloadLink').href = dataProc.download_url;
                    resultArea.classList.remove('hidden');
                    processBtn.innerHTML = '<i class="fas fa-check"></i> Propuesta Lista';
                }
            } catch (err) {
                alert("Hubo un error: " + err.message);
                processBtn.disabled = false;
                processBtn.innerHTML = '<i class="fas fa-wand-magic-sparkles"></i> Generar Propuesta';
            }
        };
    </script>
</body>
</html>
