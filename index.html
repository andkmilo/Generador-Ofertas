<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Propuestas Express | AWS Doc Engine</title>
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/9/93/Amazon_Web_Services_Logo.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .drag-active {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            transform: scale(1.02);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden max-w-md w-full border border-gray-100">
        <div class="bg-[#232f3e] p-8 text-center">
            <div class="flex justify-center mb-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/93/Amazon_Web_Services_Logo.svg" alt="AWS Logo" class="h-12 brightness-0 invert">
            </div>
            <h1 class="text-white text-2xl font-bold mb-2">AWS Doc Engine</h1>
            <p class="text-gray-400 text-sm leading-relaxed">
                Generador de resumen técnico de servicios AWS. Recuerda usar el CSV en español.
            </p>
        </div>

        <div class="p-8 space-y-5">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Nombre del Proyecto</label>
                <input type="text" id="projectName" placeholder="Ej: Proyecto Hospital Central" 
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#ff9900] focus:border-transparent outline-none transition-all">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Archivo de Costos (CSV)</label>
                <div id="dropZone" class="border-2 border-dashed border-green-300 bg-green-50 rounded-2xl p-6 text-center cursor-pointer hover:bg-green-100 transition-all duration-200">
                    <i class="fas fa-file-csv text-3xl text-green-500 mb-2"></i>
                    <p id="fileNameDisplay" class="text-gray-600 text-sm font-medium">Arrastra aquí o haz clic para subir</p>
                    <input type="file" id="fileInput" accept=".csv" class="hidden">
                </div>
            </div>

            <button id="processBtn" class="w-full bg-[#ff9900] hover:bg-[#e68a00] text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                <i class="fas fa-wand-magic-sparkles"></i> Generar Propuesta
            </button>

            <div id="resultArea" class="hidden mt-4 p-4 bg-blue-50 rounded-2xl text-center border border-blue-200">
                <p class="text-blue-700 font-bold mb-3">✨ ¡Propuesta Generada!</p>
                <a id="downloadLink" href="#" target="_blank" class="inline-flex items-center gap-2 bg-green-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-green-700">
                    <i class="fas fa-file-excel"></i> Descargar Excel
                </a>
            </div>
        </div>

        <div class="p-4 bg-gray-50 text-center border-t border-gray-100">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest">
                Andres Alfonso 🦁 - Cloud Infrastructure & AI
            </p>
        </div>
    </div>

    <script>
        const API_URL = "https://k11uv8z8r5.execute-api.us-east-1.amazonaws.com/Prod1/generar";
        
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const projectNameInput = document.getElementById('projectName');
        const processBtn = document.getElementById('processBtn');
        const resultArea = document.getElementById('resultArea');
        const fileNameDisplay = document.getElementById('fileNameDisplay');

        // --- MANEJO DE ARCHIVOS ---
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-active'); };
        dropZone.ondragleave = () => dropZone.classList.remove('drag-active');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-active');
            handleFile(e.dataTransfer.files[0]);
        };

        function handleFile(file) {
            if (file && file.name.endsWith('.csv')) {
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(file);
                fileInput.files = dataTransfer.files;
                fileNameDisplay.innerText = file.name;
                fileNameDisplay.classList.add('text-green-700', 'font-bold');
            } else {
                alert("Por favor, sube un archivo .csv válido");
            }
        }

        // --- FLUJO PRINCIPAL ---
        processBtn.onclick = async () => {
            const file = fileInput.files[0];
            const projectName = projectNameInput.value.trim();

            if (!projectName || !file) return alert("Completa el nombre del proyecto y selecciona un archivo.");

            processBtn.disabled = true;
            processBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';
            resultArea.classList.add('hidden');

            try {
                // 1. Obtener URL firmada
                const resUrl = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: "get_upload_url", file_name: file.name, project_name: projectName })
                });
                
                if (!resUrl.ok) throw new Error("Error al obtener permisos de subida (S3)");
                const presignedData = await resUrl.json();

                // 2. Subida a S3 (Corrección del error 403)
                const formData = new FormData();
                // IMPORTANTE: Los campos de la firma van PRIMERO
                Object.entries(presignedData.fields).forEach(([k, v]) => formData.append(k, v));
                // El archivo va al FINAL
                formData.append("file", file);

                const uploadRes = await fetch(presignedData.url, { method: 'POST', body: formData });
                if (!uploadRes.ok) throw new Error("S3 rechazó el archivo. Verifica CORS o la firma.");

                // 3. Procesar con IA (Lambda + Bedrock)
                const resProc = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: "process", file_name: file.name, project_name: projectName })
                });
                
                const dataProc = await resProc.json();

                if (dataProc.download_url) {
                    document.getElementById('downloadLink').href = dataProc.download_url;
                    resultArea.classList.remove('hidden');
                    processBtn.innerHTML = '<i class="fas fa-check"></i> Propuesta Generada';
                } else if (dataProc.error) {
                    throw new Error(dataProc.error);
                }

            } catch (err) {
                console.error(err);
                alert("Fallo: " + err.message);
                processBtn.disabled = false;
                processBtn.innerHTML = '<i class="fas fa-wand-magic-sparkles"></i> Reintentar';
            }
        };
    </script>
</body>
</html>
